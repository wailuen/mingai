# INFRA-039: Docker Compose for local development
# PostgreSQL 15 + pgvector + Redis 7 + backend

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mingai-postgres
    environment:
      POSTGRES_DB: mingai
      POSTGRES_USER: mingai
      POSTGRES_PASSWORD: local_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mingai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mingai-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mingai-backend
    # SCHED-030: Background jobs may run up to 2 minutes; grace period ensures
    # clean shutdown so jobs can complete before the container is force-killed.
    stop_grace_period: 2m
    ports:
      - "8025:8025"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8025 --reload

volumes:
  postgres_data:
