name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mingai
          POSTGRES_PASSWORD: mingai
          POSTGRES_DB: mingai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -q --timeout=30 --tb=short
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key-64-chars-minimum-for-testing-purposes-only-00000' }}
          JWT_ALGORITHM: HS256
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql+asyncpg://mingai:mingai@localhost:5432/mingai
          FRONTEND_URL: http://localhost:3022
          PRIMARY_MODEL: gpt-4o-mini
          CLOUD_PROVIDER: local
          OPENAI_API_KEY: test-key-not-used-in-unit-tests

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: src/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r src/backend/app/ -ll -q
