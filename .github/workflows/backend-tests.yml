# INFRA-046: CI pipeline for backend
# Runs: unit -> integration -> E2E in sequence
name: Backend Tests

on:
  push:
    paths:
      - 'src/backend/**'
  pull_request:
    paths:
      - 'src/backend/**'

defaults:
  run:
    working-directory: src/backend

jobs:
  unit:
    name: Unit Tests (Tier 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html
        env:
          FRONTEND_URL: http://localhost:3022

      - name: Check coverage
        run: coverage report --fail-under=80

  integration:
    name: Integration Tests (Tier 2)
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mingai_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/mingai_test

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost/mingai_test
          TEST_REDIS_URL: redis://localhost:6379/1
          FRONTEND_URL: http://localhost:3022
          JWT_SECRET_KEY: test_secret_key_for_ci_only_not_production_aaaaaa
          CLOUD_PROVIDER: local
          PRIMARY_MODEL: test-model
          INTENT_MODEL: test-intent
          EMBEDDING_MODEL: test-embedding
